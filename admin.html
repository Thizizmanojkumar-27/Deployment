<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - CodeNexuss</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  
  <style>
    /* Admin Specific Styles */
    body {
      padding-top: var(--nav-h);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .admin-container {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-md);
    }
    
    /* Login Overlay */
    #loginSection {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }
    .login-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .login-card h2 {
      margin-bottom: var(--space-md);
      color: var(--clr-white);
    }
    .login-card .form-group {
      text-align: left;
      margin-bottom: var(--space-md);
    }
    .login-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--clr-border);
      background: var(--clr-bg);
      color: var(--clr-text);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--clr-accent);
      box-shadow: 0 0 0 2px var(--clr-accent-glow);
    }
    #loginError {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* Dashboard */
    #dashboardSection {
      display: none; /* hidden until logged in */
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--clr-border);
    }
    .table-responsive {
      overflow-x: auto;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .admin-table th, .admin-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--clr-border);
    }
    .admin-table th {
      background: var(--clr-surface-2);
      color: var(--clr-accent);
      font-weight: 600;
      font-family: var(--font-display);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
    .admin-table tr:hover td {
      background: var(--clr-surface-2);
    }
    .empty-state {
      text-align: center;
      padding: var(--space-xl);
      color: var(--clr-muted);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">&#x2B22;</span>
        <span class="logo-text">Code<span class="accent">Nexuss</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link"><i class='bx bx-arrow-back'></i> Back to Site</a></li>
      </ul>
    </div>
  </nav>

  <main class="admin-container">
    
    <!-- LOGIN SECTION -->
    <section id="loginSection">
      <div class="login-card">
        <h2>Admin Portal</h2>
        <form id="adminLoginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Login</button>
          <div id="loginError">Invalid credentials. Please try again.</div>
        </form>
      </div>
    </section>

    <!-- DASHBOARD SECTION -->
    <section id="dashboardSection">
      <div class="dashboard-header">
        <h2>Contact Inquiries</h2>
        <button id="logoutBtn" class="btn btn-outline btn-sm"><i class='bx bx-log-out'></i> Logout</button>
      </div>

      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Project Description</th>
            </tr>
          </thead>
          <tbody id="contactTableBody">
            <!-- Data populated via JS -->
          </tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state" style="display: none;">
        No contact inquiries found.
      </div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
